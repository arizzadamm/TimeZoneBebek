<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Secure Login - Bappenas CSIRT</title>

    <script src="/js/auth-guard.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;700;900&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="/style.css">

    <style>
        :root {
            --login-bg: #03090d;
            --login-panel: rgba(6, 18, 24, 0.9);
            --login-border: rgba(0, 255, 204, 0.18);
            --login-border-strong: rgba(0, 255, 204, 0.42);
            --login-text: #effffe;
            --login-muted: #89a8a4;
            --login-danger: #ff5577;
            --login-shadow: 0 24px 54px rgba(0, 0, 0, 0.34);
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 15%, rgba(0, 255, 204, 0.16), transparent 32%),
                radial-gradient(circle at 80% 18%, rgba(0, 153, 255, 0.12), transparent 28%),
                linear-gradient(180deg, #02070a 0%, #061015 58%, #04080b 100%);
            overflow-x: hidden;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,204,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.03) 1px, transparent 1px);
            background-size: 34px 34px;
            pointer-events: none;
            opacity: 0.45;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -20%;
            background:
                radial-gradient(circle at 30% 35%, rgba(0,255,204,0.12), transparent 22%),
                radial-gradient(circle at 70% 55%, rgba(0,153,255,0.09), transparent 24%);
            filter: blur(42px);
            animation: driftGlow 10s ease-in-out infinite alternate;
            pointer-events: none;
        }

        #app {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px;
            box-sizing: border-box;
            z-index: 1;
        }

        .login-shell {
            width: min(560px, 100%);
        }

        .login-panel {
            position: relative;
            overflow: hidden;
            border-radius: 28px;
            border: 1px solid rgba(0,255,204,0.2);
            background:
                linear-gradient(180deg, rgba(8, 20, 26, 0.92), rgba(4, 10, 15, 0.96)),
                var(--login-panel);
            box-shadow: var(--login-shadow), 0 0 0 1px rgba(0,255,204,0.04), 0 0 42px rgba(0,255,204,0.08);
            backdrop-filter: blur(18px);
        }

        .login-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(135deg, rgba(0, 255, 204, 0.08), transparent 35%, transparent 60%, rgba(0, 153, 255, 0.06)),
                radial-gradient(circle at top, rgba(255,255,255,0.05), transparent 34%);
            pointer-events: none;
        }

        .login-panel::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,255,204,0.07) 48%, transparent 100%);
            background-size: 100% 140px;
            mix-blend-mode: screen;
            opacity: 0.45;
            animation: panelSweep 7.5s linear infinite;
            pointer-events: none;
        }

        .hero-orbit {
            position: relative;
            width: 184px;
            height: 184px;
            margin: 0 auto 18px;
        }

        .orbit-ring,
        .orbit-core,
        .orbit-pulse {
            position: absolute;
            inset: 0;
            border-radius: 50%;
        }

        .orbit-ring {
            border: 1px solid rgba(0,255,204,0.18);
            animation: orbitSpin 18s linear infinite;
        }

        .orbit-ring.ring-b {
            inset: 18px;
            border-color: rgba(0,153,255,0.18);
            animation-direction: reverse;
            animation-duration: 13s;
        }

        .orbit-ring.ring-c {
            inset: 44px;
            border-color: rgba(255,255,255,0.14);
            animation-duration: 9s;
        }

        .orbit-core {
            inset: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, rgba(0,255,204,0.22), rgba(0,0,0,0.1));
            border: 1px solid rgba(0,255,204,0.18);
            box-shadow: 0 0 28px rgba(0,255,204,0.18);
            color: #dffefd;
            font-family: 'Orbitron';
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 0;
            text-shadow: 0 0 14px rgba(0,255,204,0.24);
        }

        .orbit-pulse {
            inset: 76px;
            background: radial-gradient(circle, rgba(0,255,204,0.95), rgba(0,255,204,0.08));
            filter: blur(16px);
            animation: pulseGlow 2.8s ease-in-out infinite;
        }

        .login-panel {
            padding: 30px 28px 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .panel-topline {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .panel-kicker {
            color: var(--login-muted);
            letter-spacing: 0.22rem;
            text-transform: uppercase;
            font-size: 0.74rem;
        }

        .panel-chip {
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid rgba(0,255,204,0.16);
            background: rgba(0,0,0,0.2);
            color: #8fb0ab;
            font-size: 0.68rem;
            font-family: 'JetBrains Mono';
        }

        .panel-title {
            margin: 0 0 18px;
            color: var(--login-text);
            font-family: 'Orbitron';
            font-size: 1.65rem;
            text-align: center;
            letter-spacing: 0.14rem;
            text-transform: uppercase;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .field-input {
            width: 100%;
            box-sizing: border-box;
            border-radius: 16px;
            border: 1px solid rgba(0,255,204,0.24);
            background: rgba(0,0,0,0.34);
            color: var(--login-text);
            padding: 16px 18px;
            font-family: 'JetBrains Mono';
            font-size: 0.98rem;
            text-align: center;
            letter-spacing: 0.08rem;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .field-input:focus {
            border-color: var(--login-border-strong);
            box-shadow: 0 0 0 4px rgba(0,255,204,0.08);
        }

        .submit-btn {
            border: 1px solid rgba(0,255,204,0.4);
            border-radius: 16px;
            background: linear-gradient(90deg, rgba(0,255,204,0.2), rgba(0,153,255,0.18));
            color: #e7fffc;
            font-family: 'Orbitron';
            font-size: 0.9rem;
            letter-spacing: 0.14rem;
            padding: 15px 18px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            border-color: rgba(0,255,204,0.62);
            box-shadow: 0 0 28px rgba(0,255,204,0.16);
        }

        .submit-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .login-status {
            min-height: 24px;
            color: #9ab7b2;
            font-size: 0.74rem;
            text-align: center;
        }

        .login-status.error {
            color: var(--login-danger);
        }

        .panel-line {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            margin-top: 16px;
            color: #7f9a95;
            font-size: 0.68rem;
            letter-spacing: 0.12rem;
            text-transform: uppercase;
        }

        .panel-line::before,
        .panel-line::after {
            content: "";
            width: 54px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,255,204,0.28), transparent);
        }

        @keyframes driftGlow {
            from { transform: translate3d(-2%, 0, 0) scale(1); }
            to { transform: translate3d(2%, -2%, 0) scale(1.04); }
        }

        @keyframes panelSweep {
            from { transform: translateY(-140px); }
            to { transform: translateY(140px); }
        }

        @keyframes orbitSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.35; transform: scale(0.94); }
            50% { opacity: 0.72; transform: scale(1.05); }
        }

        @media (max-width: 980px) {
            .login-shell { width: min(520px, 100%); }
        }

        @media (max-width: 640px) {
            #app {
                padding: 16px;
            }

            .login-panel {
                padding: 24px 20px;
            }

            .hero-orbit {
                width: 156px;
                height: 156px;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="cyber-grid"></div>

    <div id="app">
        <div class="login-shell">
            <section class="login-panel">
                <div class="hero-orbit" aria-hidden="true">
                    <div class="orbit-ring"></div>
                    <div class="orbit-ring ring-b"></div>
                    <div class="orbit-ring ring-c"></div>
                    <div class="orbit-pulse"></div>
                    <div class="orbit-core">🦆</div>
                </div>
                <div class="panel-topline">
                    <div class="panel-kicker">Secure Entry</div>
                    <div class="panel-chip">{{ returnLabel }}</div>
                </div>
                <h2 class="panel-title glitch" data-text="BAPPENAS CSIRT">BAPPENAS CSIRT</h2>

                <form class="login-form" @submit.prevent="submitLogin">
                    <div class="field">
                        <input id="access-key" ref="inputRef" v-model="accessKey" type="password" class="field-input" placeholder="ACCESS KEY" autocomplete="current-password">
                    </div>

                    <button class="submit-btn" type="submit" :disabled="isSubmitting || !accessKey.trim()">
                        <span v-if="!isSubmitting"><i class="fas fa-shield-halved"></i> AUTHENTICATE</span>
                        <span v-else><i class="fas fa-circle-notch fa-spin"></i> VERIFYING</span>
                    </button>

                    <div class="login-status" :class="{ error: statusType === 'error' }">{{ statusMessage }}</div>
                </form>

                <div class="panel-line">Command Access</div>
            </section>
        </div>
    </div>

    <script src="/js/login-app.js?v=20260407a"></script>
</body>
</html>
