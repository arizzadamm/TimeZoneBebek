<!DOCTYPE html>
<html lang='en'>
<head>
    <script src="js/auth-guard.js"></script>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>App Portal</title>
    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;700;900&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
</head>
<body>
    {{PRELOADER}}
    <div class='scanlines'></div>
    <div class='cyber-grid'></div>
    {{SIDEBAR}}

    <div class='container'>
        <div class='header-box'>
            <h1 class='page-title glitch' data-text='MISSION LAUNCHPAD'>MISSION LAUNCHPAD</h1>
            <div style="color:#666; font-size:0.8rem;">SECURE GATEWAY</div>
        </div>

        <input type="text" id="app-search" class="portal-search" placeholder="SEARCH MODULES..." onkeyup="filterApps()">

        <div id="app-container" class="app-grid">
            <div style="color:#666;">Authenticating modules...</div>
        </div>
    </div>

    <script>
        let allApps = [];
        const icons = { 'SEC': '🛡️', 'DEV': '💻', 'DATA': '📊', 'TOOL': '🛠️', 'DEFAULT': '🔗' };

        async function loadApps() {
            try {
                const res = await fetch('/api/portal-apps', {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json', 'X-API-KEY': API_KEY }
                });
                allApps = await res.json();
                renderApps(allApps);
            } catch (e) {
                document.getElementById('app-container').innerHTML = "<div style='color:red'>FAILED TO LOAD APPS CONFIG</div>";
            }
        }

        function renderApps(apps) {
            const container = document.getElementById('app-container');
            let html = '';

            if (apps.length === 0) {
                container.innerHTML = "<div style='color:#444; text-align:center; width:100%;'>NO MODULES FOUND</div>";
                return;
            }

            apps.forEach(app => {
                const cat = app.category ? app.category.toUpperCase() : 'DEFAULT';
                const icon = icons[cat] || icons['DEFAULT'];

                // Tambahkan atribut data-tilt untuk mengaktifkan efek
                html += `
                        <a href="${app.url}" target="_blank" class="app-card cat-${cat}"
                           data-tilt data-tilt-max="15" data-tilt-speed="400" data-tilt-glare data-tilt-max-glare="0.2">

                            <div class="app-link-icon">➜</div>
                            <div>
                                <div class="app-icon">${icon}</div>
                                <div class="app-name">${app.name}</div>
                            </div>
                            <div class="app-desc">${app.description || "External Application"}</div>
                        </a>
                        `;
            });
            container.innerHTML = html;

            // RE-INIT TILT SETELAH RENDER HTML
            VanillaTilt.init(document.querySelectorAll(".app-card"));
        }

        function filterApps() {
            const query = document.getElementById('app-search').value.toLowerCase();
            const filtered = allApps.filter(app =>
                app.name.toLowerCase().includes(query) ||
                app.description.toLowerCase().includes(query) ||
                app.category.toLowerCase().includes(query)
            );
            renderApps(filtered);
        }

        loadApps();
    </script>
</body>
</html>
