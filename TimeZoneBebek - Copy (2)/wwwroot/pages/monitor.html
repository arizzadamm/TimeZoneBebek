<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Service Monitor</title>
    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;700;900&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="/style.css">
    <style>
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .srv-card {
            background: #111;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

            .srv-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 10px 20px rgba(0,255,204,0.1);
            }

            .srv-card::before {
                content: '';
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 5px;
                background: #333;
                transition: 0.3s;
            }

            .srv-card.online::before {
                background: var(--green);
                box-shadow: 0 0 10px var(--green);
            }

            .srv-card.offline::before {
                background: var(--red);
                box-shadow: 0 0 10px var(--red);
            }

        .badge {
            font-size: 0.8rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: bold;
            display: inline-block;
            width: 60px;
            text-align: center;
        }

            .badge.online {
                background: rgba(0, 255, 0, 0.1);
                color: var(--green);
                border: 1px solid var(--green);
            }

            .badge.offline {
                background: rgba(255, 51, 102, 0.1);
                color: var(--red);
                border: 1px solid var(--red);
            }

        .refresh-btn {
            background: #000;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'JetBrains Mono';
            font-weight: bold;
            transition: 0.2s;
        }

            .refresh-btn:hover {
                background: var(--cyan);
                color: #000;
            }
    </style>
</head>
<body>
    {{PRELOADER}}
    <div class='scanlines'></div>
    <div class='cyber-grid'></div>
    {{SIDEBAR}}

    <div class='container'>
        <div class='header-box'>
            <h1 class='page-title glitch' data-text='SERVICE MONITOR'>SERVICE MONITOR</h1>
            <button class='refresh-btn' onclick='fetchStatus()'>REFRESH SCAN</button>
        </div>
        <div id='grid' class='monitor-grid'>
            <div style='color:#666;'>Scanning network ports...</div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            const grid = document.getElementById('grid');
            grid.style.opacity = '0.5';
            try {
                const res = await fetch('/api/services');
                const data = await res.json();
                let html = '';
                data.forEach(srv => {
                    const statusClass = srv.isOnline ? 'online' : 'offline';
                    const statusText = srv.isOnline ? 'ONLINE' : 'OFFLINE';
                    const latencyText = srv.isOnline ? srv.latency + ' ms' : 'TIMEOUT';
                    html += `
                        <div class='srv-card ${statusClass}'>
                            <div style="display:flex; flex-direction:column; margin-left:15px;">
                                <span style="font-size:0.7rem; color:#666; font-weight:bold;">${srv.type}</span>
                                <div style="font-size:1.1rem; font-weight:bold; color:#fff; margin:2px 0;">${srv.name}</div>
                                <div style="font-size:0.7rem; color:#444;">ENDPOINT MONITORED</div>
                            </div>
                            <div style="text-align:right;">
                                <div class='badge ${statusClass}'>${statusText}</div>
                                <div style="font-size:0.7rem; color:#666; margin-top:5px;">${latencyText}</div>
                            </div>
                        </div>`;
                });
                grid.innerHTML = html;
            } catch (e) { grid.innerHTML = 'Error fetching status'; } finally { grid.style.opacity = '1'; }
        }
        fetchStatus(); setInterval(fetchStatus, 10000);
    </script>
</body>
</html>
