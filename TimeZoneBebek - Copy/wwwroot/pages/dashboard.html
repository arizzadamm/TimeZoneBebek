<!DOCTYPE html>
<html lang='id'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Command Center</title>
    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;700;900&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    {{PRELOADER}}
    <div class='scanlines'></div>
    <div class='cyber-grid'></div>

    {{SIDEBAR}}

    <div class='content'>
        <div class='brand-header'>
            <h1 class='brand-title glitch' data-text='BEBEK PINTAR'>BEBEK PINTAR</h1>
            <div class='brand-subtitle'><div class='typing-text'><span id='typed-output'></span></div></div>
        </div>

        <div class='time-section'>
            <div class='main-clock-box'>
                <span class='label'>WIB (UTC+7)</span>
                <div id='clk-wib' class='clock-xl'>00:00:00</div>
            </div>
            <div class='sub-clock-grid'>
                <div class='sub-clock'><div class='label-sm'>WITA</div><div id='clk-wita' class='clock-sm'>00:00:00</div></div>
                <div class='sub-clock'><div class='label-sm'>WIT</div><div id='clk-wit' class='clock-sm'>00:00:00</div></div>
                <div class='sub-clock'><div class='label-sm'>UTC</div><div id='clk-utc' class='clock-sm'>00:00:00</div></div>
            </div>
        </div>

        <div class='grid'>
            <div class='card'><span class='label'>Host OS</span><div class='value'>{{OS_DESC}}</div></div>
            <div class='card'><span class='label'>RAM Usage</span><div class='value'>{{RAM_DESC}}</div></div>
            <div class='card {{DISK_CLASS}}'><span class='label'>Disk Usage</span><div class='value'>{{DISK_DESC}}</div></div>
            <div class='card'><span class='label'>Uptime</span><div class='value'>{{UPTIME}}</div></div>
            <div class='card alert'><span class='label'>Your IP Address</span><div class='value'>{{REMOTE_IP}}</div></div>
            <div class='card'><span class='label'>Protocol</span><div class='value'>{{PROTOCOL}}</div></div>
        </div>

        <details class='inspector'>
            <summary>Inspect Headers</summary>
            <div class='header-content'>{{HEADER_DUMP}}</div>
        </details>
    </div>

    <div class='ticker-wrap'>
        <div class='ticker-label'>THREAT INTEL</div>
        <div class='ticker' id='news-ticker'><div class='ticker-item'>Loading...</div></div>
    </div>

    <div class='fullscreen-btn' onclick='toggleFullScreen()' title='War Room Mode'>⛶</div>

    <script>
        // Audio Context (SFX)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playBeep(freq = 800, type = 'sine', duration = 0.05) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq;
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); g.gain.setValueAtTime(0.02, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            o.stop(audioCtx.currentTime + duration);
        }
        document.addEventListener('click', () => playBeep(600, 'sawtooth', 0.1));

        // Fullscreen
        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        // Clock Logic
        function updateClock() {
            const n = new Date();
            const g = (z) => new Intl.DateTimeFormat('id-ID', { timeZone: z, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }).format(n).replace(/\./g, ':');
            document.getElementById('clk-wib').innerText = g('Asia/Jakarta');
            document.getElementById('clk-wita').innerText = g('Asia/Makassar');
            document.getElementById('clk-wit').innerText = g('Asia/Jayapura');
            document.getElementById('clk-utc').innerText = g('UTC');
        }
        setInterval(updateClock, 1000); updateClock();

        // News Ticker
        fetch('/api/news').then(r => r.json()).then(d => {
            if (d.length) {
                const h = d.map(i => `<div class='ticker-item'><span style='color:var(--yellow);animation:pulse 1s infinite;'>[NEWS]</span> <a href='${i.link}' target='_blank'>${i.title}</a></div>`).join('');
                document.getElementById('news-ticker').innerHTML = h + h;
            }
        });

        // --- 1. AKTIFKAN TYPED.JS ---
    var typed = new Typed('#typed-output', {
        strings: [
            "BY ^200 <span style='color:var(--cyan)'>CYBERTEAM BAPPENAS</span>", // ^200 artinya pause 200ms
            "SYSTEM STATUS: ^500 <span style='color:var(--green)'>SECURE</span>",
            "MONITORING ACTIVE..."
        ],
        typeSpeed: 30,
        backSpeed: 20,
        backDelay: 2000,
        startDelay: 500,
        loop: true,
        contentType: 'html' // Agar bisa render warna span
    });

    // --- 2. CONTOH TOASTIFY (Panggil saat refresh data) ---
    function showToast(msg, type='info') {
        let color = type === 'alert' ? "linear-gradient(to right, #ff5f6d, #ffc371)" : "linear-gradient(to right, #00b09b, #96c93d)";
        if(type === 'cyber') color = "linear-gradient(to right, #000000, #004e92)";
        
        Toastify({
            text: msg,
            duration: 3000,
            gravity: "top", // top or bottom
            position: "right", // left, center or right
            stopOnFocus: true, // Prevents dismissing of toast on hover
            style: {
                background: "#111",
                border: "1px solid var(--cyan)",
                color: "var(--cyan)",
                boxShadow: "0 0 10px rgba(0,255,204,0.2)",
                fontFamily: "Orbitron"
            }
        }).showToast();
    }

    // Panggil Toast saat halaman siap
    showToast("SYSTEM INITIALIZED", "cyber");
    
    // Panggil Toast di dalam fungsi fetch/update
    // Contoh: di dalam fungsi updateClock() atau fetchStatus()
    // showToast("Data Refreshed");
    </script>
</body>
</html>
