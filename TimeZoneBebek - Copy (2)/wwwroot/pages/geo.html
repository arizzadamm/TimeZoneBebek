<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Geo Tracer</title>
    <link href='https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@400;500;700;900&display=swap' rel='stylesheet'>
    <link rel="stylesheet" href="/style.css">
    <link rel='stylesheet' href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css' />
    <style>
        #map {
            height: 450px;
            width: 100%;
            border: 2px solid #333;
            border-radius: 8px;
            margin-bottom: 20px;
            filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
            z-index: 1;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .cyber-input {
            flex: 1;
            background: #000;
            border: 1px solid #333;
            color: var(--cyan);
            padding: 15px;
            font-family: 'JetBrains Mono';
            font-size: 1.1rem;
            letter-spacing: 1px;
            transition: 0.3s;
        }

            .cyber-input:focus {
                outline: none;
                border-color: var(--cyan);
                box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            }

            .cyber-input:disabled {
                opacity: 0.3;
                cursor: not-allowed;
            }
        /* Style saat disabled */

        .cyber-btn {
            background: #111;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 0 30px;
            font-family: 'Orbitron';
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

            .cyber-btn:hover {
                background: var(--cyan);
                color: #000;
                box-shadow: 0 0 20px var(--cyan);
            }

        .btn-clear {
            border-color: var(--red);
            color: var(--red);
        }

            .btn-clear:hover {
                background: var(--red);
                color: #fff;
                box-shadow: 0 0 20px var(--red);
            }

        /* Tombol Toggle Auto Hunt khusus */
        .btn-hunt {
            font-size: 0.7rem;
            padding: 5px 15px;
            margin-left: 10px;
            border: 1px solid var(--yellow);
            color: var(--yellow);
            background: transparent;
        }

            .btn-hunt.active {
                background: var(--yellow);
                color: #000;
                box-shadow: 0 0 15px var(--yellow);
                animation: pulse 1s infinite;
            }

        .geo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .leaflet-overlay-pane path.trace-line {
            stroke-dasharray: 5, 10;
            animation: dash 2s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -100;
            }
        }
    </style>
</head>
<body>
    {{PRELOADER}}
    <div class='scanlines'></div>
    <div class='cyber-grid'></div>
    {{SIDEBAR}}

<div class='container'>
    <div class='header-box'>
        <h1 class='page-title glitch' data-text='TACTICAL MAP'>TACTICAL MAP</h1>
        <div style="text-align:right;">
            <span class='status-blink' id="status-text" style="color:var(--green);">● READY</span>
            <button id="btn-auto" class="cyber-btn btn-hunt" onclick="toggleLiveMode()">AUTO-HUNT: OFF</button>
        </div>
    </div>

    <div class="search-box">
        <input type="text" id="ip-input" class="cyber-input" placeholder="ENTER TARGET IP..." onkeypress="handleEnter(event)">
        <button id="btn-scan" class="cyber-btn" onclick="manualTrace()">SCAN</button>
        <button class="cyber-btn btn-clear" onclick="clearMap()">CLEAR</button>
    </div>

    <div id='map'></div>

    <div class='geo-grid'>
        <div class='card hud-card'><span class='label'>Target IP</span><div class='value' id='ip-val'>READY</div></div>
        <div class='card hud-card'><span class='label'>Location</span><div class='value' id='city-val'>---</div></div>
        <div class='card hud-card'><span class='label'>Coordinates</span><div class='value' id='coord-val'>---</div></div>
    </div>

    <div id="intel-panel" class="intel-box">
        <div class="intel-header">
            <div class="intel-title">>> INTELLIGENCE DOSSIER</div>
            <div id="flag-container" class="flag-icon"></div>
        </div>
        <div class="intel-data-grid">
            <div>
                <div class="intel-row"><span class="intel-label">ISP</span><span class="intel-value" id="int-isp">Loading...</span></div>
                <div class="intel-row"><span class="intel-label">ORG</span><span class="intel-value" id="int-org">Loading...</span></div>
                <div class="intel-row"><span class="intel-label">ASN</span><span class="intel-value" id="int-as" style="color:var(--yellow)">Loading...</span></div>
            </div>
            <div>
                <div class="intel-row"><span class="intel-label">TZ</span><span class="intel-value" id="int-tz">Loading...</span></div>
                <div class="intel-row"><span class="intel-label">REGION</span><span class="intel-value" id="int-reg">Loading...</span></div>
                <div class="intel-row"><span class="intel-label">TYPE</span><span class="intel-value" id="int-type" style="font-weight:bold;">ANALYZING...</span></div>
            </div>
        </div>
    </div>
    <div id="threat-log-panel" class="intel-box" style="display:none; border-left: 5px solid var(--red);">
        <div class="intel-header">
            <div class="intel-title">>> ACTIVE THREAT LOG (TOP 10)</div>
            <div style="font-size:0.8rem; color:#666;">SOURCE: SIEM ELASTIC</div>
        </div>

        <table class="threat-table">
            <thead>
                <tr>
                    <th>ORG / ISP</th>
                    <th>IP ADDRESS</th>
                    <th>LOC</th>
                    <th>ALERTS</th>
                </tr>
            </thead>
            <tbody id="threat-tbody">
            </tbody>
        </table>
    </div>
</div>

    <script src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'></script>
    <script>
        // --- MAP SETUP ---
        var map = L.map('map').setView([-6.2088, 106.8456], 4);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '&copy; OpenStreetMap' }).addTo(map);
        const HOME_LAT = -6.2088; const HOME_LON = 106.8456;
        var homeIcon = L.divIcon({ className: 'custom-div-icon', html: "<div style='background-color:var(--cyan); width:10px; height:10px; border-radius:50%; box-shadow:0 0 10px var(--cyan);'></div>", iconSize: [10, 10] });
        L.marker([HOME_LAT, HOME_LON], { icon: homeIcon }).addTo(map).bindPopup("COMMAND CENTER (HQ)");

        // --- VARIABLES ---
        const MAX_TRACES = 10; // Bisa lebih banyak utk auto hunt
        let traceQueue = [];
        let liveModeInterval = null;

        function handleEnter(e) { if (e.key === 'Enter') manualTrace(); }

        // --- TOGGLE: MANUAL VS AUTO HUNT ---
        function toggleLiveMode() {
            const btn = document.getElementById('btn-auto');
            const input = document.getElementById('ip-input');
            const scanBtn = document.getElementById('btn-scan');
            const statusText = document.getElementById('status-text');

            if (liveModeInterval) {
                // MATIKAN AUTO HUNT -> KEMBALI KE MANUAL
                clearInterval(liveModeInterval);
                liveModeInterval = null;

                btn.innerText = "AUTO-HUNT: OFF";
                btn.classList.remove('active');

                // Hidupkan Manual Input
                input.disabled = false;
                scanBtn.disabled = false;
                input.placeholder = "ENTER TARGET IP...";
                statusText.innerHTML = "● READY (MANUAL)";
                statusText.style.color = "var(--green)";

                alert("AUTO-HUNT DEACTIVATED. MANUAL CONTROL RESTORED.");
                document.getElementById('threat-log-panel').style.display = 'none'; // Sembunyikan Tabel
            } else {
                // HIDUPKAN AUTO HUNT
                alert("AUTO-HUNT ACTIVATED. CONNECTING TO SIEM...");

                // Matikan Manual Input
                input.disabled = true;
                scanBtn.disabled = true;
                input.value = "";
                input.placeholder = "SYSTEM CONTROLLED BY SIEM...";

                btn.innerText = "AUTO-HUNT: ACTIVE";
                btn.classList.add('active');
                statusText.innerHTML = "● LIVE THREAT FEED";
                statusText.style.color = "var(--red)";

                fetchThreats(); // Jalankan sekali langsung
                liveModeInterval = setInterval(fetchThreats, 500000); // Loop tiap 10 detik
            }
        }

        // --- LOGIC 1: MANUAL TRACE ---
        async function manualTrace() {
            const inputIp = document.getElementById('ip-input').value;
            if (!inputIp) return;

            try {
                const url = `/api/geo-trace?ip=${inputIp}`;
                const r = await fetch(url);
                if (r.status === 429) { alert("RATE LIMIT!"); return; }
                const d = await r.json();

                if (d.status === 'success') {
                    updateUI(d);
                    updateIntelCard(d);
                    addTraceToMap(d.lat, d.lon, d.query);
                } else { alert("IP Not Found"); }
            } catch (e) { alert("Trace Failed"); }
        }

        // --- LOGIC 2: AUTO THREATS (ELASTIC) ---
        async function fetchThreats() {
            try {
                const r = await fetch('/api/threats');

                // 1. Cek HTTP Status (Apakah 200 OK?)
                if (!r.ok) {
                    console.warn("Threat API Error:", r.status);
                    return;
                }

                const threats = await r.json();

                if (!Array.isArray(threats) || threats.length === 0) return;

                // 1. SEMBUNYIKAN PANEL MANUAL, TAMPILKAN PANEL LIST
                document.getElementById('intel-panel').style.display = 'none';
                document.getElementById('threat-log-panel').style.display = 'block';

                renderThreatTable(threats);

                // 3. VISUALISASI PETA (Tetap gambar garisnya)
                threats.forEach((t, index) => {
                    // Delay animasi biar tidak barengan, makin bawah makin lambat
                    setTimeout(() => {
                        addTraceToMap(t.lat, t.lon, t.ip);
                    }, index * 500);
                });

                //// 2. VALIDASI: Pastikan data adalah Array dan TIDAK KOSONG
                //if (!Array.isArray(threats) || threats.length === 0) {
                //    console.log("System Secure: No active threats detected.");
                //    // Optional: Update UI agar terlihat aman
                //    document.getElementById('ip-val').innerText = "SECURE";
                //    document.getElementById('city-val').innerText = "No Active Threats";
                //    document.getElementById('coord-val').innerText = "---";
                //    return; // Stop eksekusi agar tidak error di baris bawah
                //}

                // Jika lolos validasi (Data ada), baru eksekusi kode ini
                //const top = threats[0];

                //// Update UI Panel dengan ancaman terbesar (Top 1)
                //// Kita gunakan optional chaining (?.) agar aman jika properti null
                //updateUI({
                //    query: top.ip,
                //    city: top.country || "Unknown",
                //    isp: "SIEM ALERT (" + top.count + ")",
                //    lat: top.lat,
                //    lon: top.lon
                //});

                //// Sembunyikan dossier detail
                //const intelPanel = document.getElementById('intel-panel');
                //if (intelPanel) intelPanel.style.display = 'none';

                //// Gambar semua ancaman
                //threats.forEach(t => {
                //    setTimeout(() => {
                //        addTraceToMap(t.lat, t.lon, t.ip);
                //    }, Math.random() * 2000);
                //});

            } catch (e) {
                console.error("SIEM Fetch Error:", e);
            }
        }
        function renderThreatTable(data) {
            const tbody = document.getElementById('threat-tbody');
            tbody.innerHTML = ''; // Bersihkan data lama

            data.forEach(t => {
                const row = document.createElement('tr');
                row.className = 'row-animate'; // Efek slide in

                // Tentukan warna berdasarkan jumlah serangan
                let severityClass = 'lvl-low';
                if (t.count > 100) severityClass = 'lvl-med';
                if (t.count > 500) severityClass = 'lvl-high';

                // Bendera
                const flag = t.country ? t.country.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397)) : "🚩";

                // Potong nama ISP biar tidak kepanjangan merusak tabel
                // Coba cari Org name dari IP API (biasanya belum ada di endpoint list threat, 
                // tapi kalau mau detail, endpoint API C# harus return data ISP juga. 
                // Asumsi saat ini backend return Country & IP).
                // Kita pakai Country Name sebagai ganti Org sementara.

                row.innerHTML = `
                <td>${t.country || "UNKNOWN"}</td>
                <td style="color:#fff;">${t.ip}</td>
                <td>${flag}</td>
                <td class="${severityClass}">${t.count} HITS</td>
            `;
                tbody.appendChild(row);
            });
        }

        // --- SHARED FUNCTIONS ---
        function updateUI(d) {
            document.getElementById('ip-val').innerText = d.query;
            document.getElementById('city-val').innerText = (d.city || "") + ', ' + (d.countryCode || d.country || "");
            document.getElementById('coord-val').innerText = d.lat + ', ' + d.lon;
        }

        function updateIntelCard(d) {
            const panel = document.getElementById('intel-panel');
            panel.style.display = 'block';
            document.getElementById('int-isp').innerText = d.isp || "Unknown";
            document.getElementById('int-org').innerText = d.org || d.isp;
            document.getElementById('int-as').innerText = d.as || "N/A";
            document.getElementById('int-tz').innerText = d.timezone || "UTC";
            document.getElementById('int-reg').innerText = (d.regionName || "") + " " + (d.zip || "");
            const flagEmoji = d.countryCode ? d.countryCode.toUpperCase().replace(/./g, c => String.fromCodePoint(c.charCodeAt(0) + 127397)) : "🏳️";
            document.getElementById('flag-container').innerText = flagEmoji;

            const ispUpper = (d.isp + d.org).toUpperCase();
            const elType = document.getElementById('int-type');
            if (ispUpper.includes("CLOUD") || ispUpper.includes("HOSTING") || ispUpper.includes("AWS")) {
                elType.innerText = "DATA CENTER / BOT"; elType.style.color = "var(--red)";
            } else {
                elType.innerText = "RESIDENTIAL"; elType.style.color = "var(--green)";
            }
        }

        function addTraceToMap(targetLat, targetLon, labelIP) {
            if (traceQueue.length >= MAX_TRACES) {
                const old = traceQueue.shift();
                cancelAnimationFrame(old.animFrame); map.removeLayer(old.poly); map.removeLayer(old.marker); map.removeLayer(old.bullet);
            }

            var latlngs = [];
            var offsetX = (targetLon - HOME_LON) / 2, offsetY = (targetLat - HOME_LAT) / 2;
            var r = Math.sqrt(Math.pow(offsetX, 2) + Math.pow(offsetY, 2));
            var theta = Math.atan2(offsetY, offsetX);
            var thetaOffset = 3.14 / 10;
            var r2 = (r / 2) / Math.cos(thetaOffset);
            var theta2 = theta + thetaOffset;
            var midX = (r2 * Math.cos(theta2)) + HOME_LON, midY = (r2 * Math.sin(theta2)) + HOME_LAT;

            for (var t = 0; t <= 1; t += 0.01) {
                var lat = (1 - t) * (1 - t) * HOME_LAT + 2 * (1 - t) * t * midY + t * t * targetLat;
                var lon = (1 - t) * (1 - t) * HOME_LON + 2 * (1 - t) * t * midX + t * t * targetLon;
                latlngs.push([lat, lon]);
            }

            const newPoly = L.polyline(latlngs, { color: '#ff3366', weight: 1, opacity: 0.6, className: 'trace-line' }).addTo(map);
            const targetIcon = L.divIcon({ className: 'custom-div-icon', html: "<div style='border: 1px solid var(--red); width:10px; height:10px; background:rgba(255,0,0,0.2); border-radius:50%;'></div>", iconSize: [10, 10] });
            const newMarker = L.marker([targetLat, targetLon], { icon: targetIcon }).addTo(map).bindPopup(`<b>${labelIP}</b><br>DETECTED`);
            const bulletIcon = L.divIcon({ className: 'bullet-icon', html: "<div style='background:#fff; width:4px; height:4px; border-radius:50%; box-shadow:0 0 8px #fff;'></div>", iconSize: [4, 4] });
            const newBullet = L.marker([HOME_LAT, HOME_LON], { icon: bulletIcon }).addTo(map);

            let step = 0, animId;
            function animate() {
                step += 1; if (step >= latlngs.length) step = 0;
                newBullet.setLatLng(latlngs[step]);
                animId = requestAnimationFrame(animate);
            }
            animate();

            traceQueue.push({ poly: newPoly, marker: newMarker, bullet: newBullet, animFrame: animId });
        }

        function clearMap() {
            traceQueue.forEach(i => { cancelAnimationFrame(i.animFrame); map.removeLayer(i.poly); map.removeLayer(i.marker); map.removeLayer(i.bullet); });
            traceQueue = [];
            document.getElementById('ip-val').innerText = "CLEARED";
            document.getElementById('intel-panel').style.display = 'none';
        }
    </script>
</body>
</html>
